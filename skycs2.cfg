sv_cheats 1
mirv_cvar_unhide_all
clear
echo "saq1b's cs2 HLAE skychanger cfg loaded;type skyhelp for commands"


// LIST
alias skyhelp "skypt1;echo;echo italy;echo italyfog;echo italylighting;echo office;echo dust;echo skydefault;echo sunset;echo airplane;echo baggage;echo black;echo day;echo cloudy;echo anubis;echo dust2;echo dust3;skypt2;echo"
alias skypt1 "echo;echo resetsky - resets sky (does not reset clouds);echo clouds - toggles visibility of clouds;echo type any of the following to load their names:"
alias skypt2 "echo mirage;echo nuke;echo overpass;echo train;echo vertigo;echo aztec;echo azteclighting;echo aztecv1;echo overcast;echo rainnight;echo;echo experimental:;echo;echo 55;echo 65;echo inferno"

// CLOUDS
alias clouds clouds_off
alias clouds_off "mirv_sky clouds draw 0;alias clouds clouds_on"
alias clouds_on "mirv_sky clouds draw 1;alias clouds clouds_off"

// RESET SKY
alias resetsky "mirv_sky material default"


// ALIAS SKIES
alias italy "mirv_sky material materials/skybox/cs_italy_s2_skybox_2.vmat_c"
alias italyfog "mirv_sky material materials/skybox/cs_italy_s2_skybox_2_fog.vmat_c"
alias italylighting "mirv_sky material materials/skybox/cs_italy_s2_skybox_2_lighting.vmat_c
alias office "mirv_sky material materials/skybox/cs_office_45_0.vmat_c"
alias dust "mirv_sky material materials/skybox/hr_dust_ground_sand_skybox.vmat_c"
alias skydefault "mirv_sky material materials/skybox/light_test_sky_default.vmat_c"
alias sunset "mirv_sky material materials/skybox/light_test_sky_sunset_light.vmat_c"
alias airplane "mirv_sky material materials/skybox/overpass_airplane_001.vmat_c"
alias baggage "mirv_sky material materials/skybox/sky_ar_baggage_01.vmat_c"
alias black "mirv_sky material materials/skybox/sky_black.vmat_c"
alias day "mirv_sky material materials/skybox/sky_cs15_daylight01_hdr.vmat_c"
alias cloudy "mirv_sky material materials/skybox/sky_csgo_cloudy01.vmat_c"
alias anubis "mirv_sky material materials/skybox/sky_de_annubis.vmat_c" // no i didnt misspell it really is annubis
alias dust2 "mirv_sky material materials/skybox/sky_de_dust2.vmat_c"
alias dust3 "mirv_sky material materials/skybox/sky_de_dust22.vmat_c"
alias mirage "mirv_sky material materials/skybox/sky_de_mirage.vmat_c"
alias nuke "mirv_sky material materials/skybox/sky_de_nuke.vmat_c"
alias overpass "mirv_sky material materials/skybox/sky_de_overpass_01.vmat_c"
alias train "mirv_sky material materials/skybox/sky_de_train03.vmat_c"
alias vertigo "mirv_sky material materials/skybox/sky_de_vertigo.vmat_c"
alias aztec "mirv_sky material materials/skybox/sky_hr_aztec_02.vmat_c"
alias azteclighting "mirv_sky material materials/skybox/sky_hr_aztec_02_lighting.vmat_c"
alias aztecv1 "mirv_sky material materials/skybox/sky_hr_aztec_02_v1.vmat_c"
alias overcast "mirv_sky material materials/skybox/sky_overcast_01.vmat_c"
alias rainnight "mirv_sky material materials/skybox/sky_rain_night_01.vmat_c"

alias 55 "mirv_sky material materials/skybox/skymodel_hosekwilkie_ref/skymodel_hosekwilkie_albedo_0_30_turbidity_02_0_elevation_55_0.vmat_c"
alias 65 "mirv_sky material materials/skybox/skymodel_hosekwilkie_ref/skymodel_hosekwilkie_albedo_0_30_turbidity_02_0_elevation_65_0.vmat_c"

alias inferno "mirv_sky material materials/skybox/test/s2_de_inferno_sky01.vmat_c"
